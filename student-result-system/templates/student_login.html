{% extends "base.html" %}
{% block title %}Student Login{% endblock %}
{% block content %}
<div class="container" style="max-width:440px">
  <div style="margin-top:3rem" class="card">
    <h2 style="margin-bottom:0.25rem;font-size:1.5rem">Student Login</h2>
    <p style="color:var(--muted);font-size:0.85rem;margin-bottom:2rem">Enter your roll number and password</p>
    <form method="POST">
      <div class="form-group"><label>Roll Number</label><input name="roll" placeholder="e.g. BIT001" required></div>
      <div class="form-group"><label>Password</label><input name="password" type="password" placeholder="Your password" required></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Login →</button>
    </form>
    <div class="divider"></div>
    <p style="text-align:center;font-size:0.82rem;color:var(--muted)">Admin? <a href="{{ url_for('admin_login') }}">Login here</a></p>
  </div>
</div>
{% endblock %}
