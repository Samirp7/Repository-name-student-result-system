{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div class="container" style="max-width:440px">
  <div style="margin-top:3rem" class="card">
    <h2 style="margin-bottom:0.25rem;font-size:1.5rem">Admin Login</h2>
    <p style="color:var(--muted);font-size:0.85rem;margin-bottom:2rem">Default: admin / admin123</p>
    <form method="POST">
      <div class="form-group"><label>Username</label><input name="username" placeholder="admin" required></div>
      <div class="form-group"><label>Password</label><input name="password" type="password" placeholder="Password" required></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Login →</button>
    </form>
  </div>
</div>
{% endblock %}
