{% extends "base.html" %}
{% block title %}Add Student{% endblock %}
{% block content %}
<div class="container" style="max-width:540px">
  <a href="{{ url_for('admin_dashboard') }}" class="back-link">← Back to Dashboard</a>
  <div class="card">
    <h2 style="font-size:1.5rem;margin-bottom:0.25rem">Add New Student</h2>
    <p style="color:var(--muted);font-size:0.85rem;margin-bottom:2rem">Fill in student details</p>
    <form method="POST">
      <div class="form-group"><label>Full Name</label><input name="name" placeholder="e.g. Ram Sharma" required></div>
      <div class="form-group"><label>Roll Number</label><input name="roll" placeholder="e.g. BIT001" required></div>
      <div class="form-group"><label>Batch / Year</label><input name="batch" placeholder="e.g. 2022-2026" required></div>
      <div class="form-group"><label>Password</label><input name="password" type="password" placeholder="Student login password" required></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Add Student →</button>
    </form>
  </div>
</div>
{% endblock %}
